apiVersion: agentspec.orchestrator.dev/v2alpha1
kind: Workflow
metadata:
  key: default
spec:
  name: Default Workflow
  description: Plan, implement, and verify code changes.
  steps:
    - key: plan
      name: Plan
      agentRole: executor
    - key: implement
      name: Implement
      agentRole: executor
    - key: verify
      name: Verify
      agentRole: executor
